<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - PDV</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card-login { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 320px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #219150; }
        #mensagem-erro { color: #e74c3c; font-size: 14px; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card-login">
        <h2>Acesso ao Sistema</h2>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
        <p style="margin-top:10px;">
  <a href="#" onclick="resetarSenha()" style="font-size:14px;">Esqueci minha senha</a>
</p>
        <div id="mensagem-erro"></div>
    </div>

    <!-- Scripts do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD7HIgiL4WjqBO6PMUizdyqHcCHikGH8QA",
            authDomain: "sistemaminimercado-fc4a5.firebaseapp.com",
            projectId: "sistemaminimercado-fc4a5",
            storageBucket: "sistemaminimercado-fc4a5.firebasestorage.app",
            messagingSenderId: "543846706936",
            appId: "1:543846706936:web:c8498b58d390108a3a150d",
            measurementId: "G-3CRCHVSWP9"
        };

// Inicializa o Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
const auth = firebase.auth();

async function fazerLogin() {
    const usuarioDigitado = document.getElementById('usuario').value;
    const senhaDigitada = document.getElementById('senha').value;
    const erroDiv = document.getElementById('mensagem-erro');

    if (!usuarioDigitado || !senhaDigitada) {
        erroDiv.innerText = "Preencha todos os campos.";
        return;
    }

    erroDiv.innerText = "Verificando...";

    try {
        const usuariosRef = db.collection("usuarios");
        const snapshot = await usuariosRef.where("usuario", "==", usuarioDigitado).get();

        if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            const dados = doc.data();

            try {
                await auth.signInWithEmailAndPassword(dados.email, senhaDigitada);
                console.log("Auth OK");
            } catch (error) {
                console.log("Erro Auth:", error.message);
                erroDiv.innerText = "Email ou senha inválidos";
                return;
            }

            if (dados.status && dados.status !== "ativo") {
                erroDiv.innerText = "Usuário bloqueado!";
                return;
            }

            const hoje = new Date().toISOString().split('T')[0];
            if (dados.vencimento && dados.vencimento < hoje) {
                erroDiv.innerText = "Licença expirada em: " + dados.vencimento;
                return;
            }

            sessionStorage.setItem('estaLogado', 'true');
            sessionStorage.setItem('nomeUsuario', dados.usuario); 
            sessionStorage.setItem('nivelUsuario', dados.nivel || 'comum'); 
            
            window.location.href = 'index.html';

        } else {
            erroDiv.innerText = "Usuário não encontrado!";
        }
    } catch (err) {
        console.error(err);
        erroDiv.innerText = "Erro ao conectar com o Firebase.";
    }
}


// 👇 ESQUECI SENHA
async function resetarSenha() {
    const usuarioDigitado = document.getElementById('usuario').value;
    const erroDiv = document.getElementById('mensagem-erro');

    if (!usuarioDigitado) {
        erroDiv.innerText = "Digite seu usuário primeiro.";
        return;
    }

    erroDiv.innerText = "Buscando email...";

    try {
        const snapshot = await db.collection("usuarios")
            .where("usuario", "==", usuarioDigitado)
            .get();

        if (snapshot.empty) {
            erroDiv.innerText = "Usuário não encontrado!";
            return;
        }

        const dados = snapshot.docs[0].data();

        await auth.sendPasswordResetEmail(dados.email);

        erroDiv.innerText = "Email enviado! Verifique sua caixa de entrada ou spam.";
    } catch (error) {
        console.error(error);
        erroDiv.innerText = "Erro ao enviar email.";
    }
}

document.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') fazerLogin();
});
    </script>
</body>
</html>
